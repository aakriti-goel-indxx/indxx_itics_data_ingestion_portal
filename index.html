};
window.submitQCDirect = function(wbId, dec, comment) {
  if (!dec) { toast('Decision required.','err'); return; }
  if (!comment) { toast('Comment is mandatory.','err'); return; }
  const w = WORKBENCH.find(x=>x.id===wbId); if (!w) return;
  if (dec==='accept') {
    w.wfStatus = 'COMPLETED'; w.completionStatus = 'COMPLETED'; w.qcBy = currentUser.name;
    const allYrs = [...new Set([...(w.yearsGC||[]), ...(w.pendingYears||[])])].sort((a,b)=>a-b);
    const existing = GOLDEN.find(g=>g.coId===w.coId);
    if (existing) {
      existing.yearsGC = [...new Set([...existing.yearsGC,...allYrs])].sort();
      existing.pushedDate = new Date().toISOString().split('T')[0];
      existing.pushedBy = currentUser.name;
      existing.invalidated = false; existing.invYears = [];
    } else {
      GOLDEN.push({id:'G'+uid(),coId:w.coId,coName:w.coName,isin:w.isin,l0:w.l0,l0Name:w.l0Name,
        yearsGC:allYrs,pushedDate:new Date().toISOString().split('T')[0],pushedBy:currentUser.name,
        invalidated:false,invYears:[]});
    }
    AUDIT.unshift({id:'AL'+uid(),user:currentUser.name,role:'qc',
      action:'QC Accepted → Pushed to GC',co:w.coName,year:allYrs.join(', '),
      ts:new Date().toLocaleString('en-GB'),detail:comment});
    const wbIdx = WORKBENCH.findIndex(x=>x.id===wbId);
    if (wbIdx !== -1) WORKBENCH.splice(wbIdx, 1);
    toast(`${w.coName} accepted and pushed to Golden Copy ✓`, 'ok');
  } else {
    w.rejCount = (w.rejCount||0)+1; w.rejComment = comment;
    if (w.rejCount >= 2) {
      w.wfStatus = 'PENDING_IC';
      AUDIT.unshift({id:'AL'+uid(),user:currentUser.name,role:'qc',
        action:`QC Rejected (${w.rejCount}x) → Escalated to Committee`,co:w.coName,year:'—',
        ts:new Date().toLocaleString('en-GB'),detail:comment});
      toast(`${w.coName} — 2nd rejection. Escalated to ITICS Committee.`, 'warn');
    } else {
      w.wfStatus = 'PENDING_ANALYST';
      AUDIT.unshift({id:'AL'+uid(),user:currentUser.name,role:'qc',
        action:'QC Rejected (1st)',co:w.coName,year:'—',
        ts:new Date().toLocaleString('en-GB'),detail:comment});
      toast(`${w.coName} rejected. Returned to ${w.assignedTo}.`, 'warn');
    }
  }
  refreshBadges(); nav('workbench');
};

window.submitQC = function(wbId, action) {
  const dec = action || document.querySelector('input[name="qc-dec"]:checked')?.value;
  const comment = document.getElementById('qc-comment').value.trim();
  if (!dec) { toast('Select Accept or Reject.','err'); return; }
  if (!comment) { toast('Comment is mandatory.','err'); return; }
  const w = WORKBENCH.find(x=>x.id===wbId); if (!w) return;
  if (dec==='accept') {
    w.wfStatus = 'COMPLETED';
    w.completionStatus = 'COMPLETED';
    w.qcBy = currentUser.name;
    const allYrs = [...new Set([...(w.yearsGC||[]), ...(w.pendingYears||[])])].sort((a,b)=>a-b);
    const existing = GOLDEN.find(g=>g.coId===w.coId);
    if (existing) {
      existing.yearsGC = [...new Set([...existing.yearsGC, ...allYrs])].sort();
      existing.pushedDate = new Date().toISOString().split('T')[0];
      existing.pushedBy = currentUser.name;
      existing.invalidated = false; existing.invYears = [];
    } else {
      GOLDEN.push({id:'G'+uid(),coId:w.coId,coName:w.coName,isin:w.isin,l0:w.l0,l0Name:w.l0Name,
        yearsGC:allYrs,pushedDate:new Date().toISOString().split('T')[0],pushedBy:currentUser.name,
        invalidated:false,invYears:[]});
    }
    AUDIT.unshift({id:'AL'+uid(),user:currentUser.name,role:'qc',
      action:'QC Accepted → Pushed to GC',co:w.coName,year:allYrs.join(', '),
      ts:new Date().toLocaleString('en-GB'),detail:comment});
    // Remove the WB entry — the editable copy disappears now that GC is updated
    const wbIdx = WORKBENCH.findIndex(x => x.id === wbId);
    if (wbIdx !== -1) WORKBENCH.splice(wbIdx, 1);
    closeModal(); toast(`${w.coName} accepted and pushed to Golden Copy ✓`, 'ok');
  } else {
    w.rejCount = (w.rejCount||0)+1;
    w.rejComment = comment;
    if (w.rejCount >= 2) {
      w.wfStatus = 'PENDING_IC';
      AUDIT.unshift({id:'AL'+uid(),user:currentUser.name,role:'qc',
        action:`QC Rejected (${w.rejCount}x) → Escalated to Committee`,co:w.coName,year:'—',
        ts:new Date().toLocaleString('en-GB'),detail:comment});
      closeModal(); toast(`${w.coName} — 2nd rejection. Escalated to ITICS Committee.`, 'warn');
    } else {
      w.wfStatus = 'rejected';
      AUDIT.unshift({id:'AL'+uid(),user:currentUser.name,role:'qc',
        action:`QC Rejected (1st)`,co:w.coName,year:'—',
        ts:new Date().toLocaleString('en-GB'),detail:comment});
      closeModal(); toast(`${w.coName} rejected. Returned to ${w.assignedTo}.`, 'warn');
    }
  }
  refreshBadges(); renderWorkbench();
};

function renderCA() {

  function getRows() {
    return CORP_ACTIONS.filter(ca => {
      if (fTab!=='all' && ca.status!==fTab) return false;

      return true;
    });

  document.getElementById('view').innerHTML = `
  <div class="pg-hd">
    <div><div class="pg-title">CA Handling</div><div class="pg-sub">Corporate actions impacting ITICS classified companies</div></div>

      <button class="btn btn-ghost btn-sm" onclick="exportCA('csv')">CSV</button>
      <button class="btn btn-ghost btn-sm" onclick="exportCA('xlsx')">XLSX</button>

        <option value="Pending">Pending</option>

        <th></th>
      </tr></thead>
      <tbody id="ca-body"></tbody>

  function draw() {

window.dlPreview = function() {
  const count = document.getElementById('dl-preview-count');
  const note  = document.getElementById('dl-preview-note');
  if (!count) return;
  try {
    const rows = buildReportRows();
    count.textContent = rows.length.toLocaleString();
    note.textContent  = 'segment-year records match current filters';
    count.style.color = rows.length > 0 ? 'var(--blue)' : 'var(--txt3)';
  } catch(e) {
    count.textContent = '—';
    note.textContent  = 'Adjust filters';
  }
};

function buildReportRows() {
  const src     = document.querySelector('input[name="dl-src"]:checked')?.value || 'gc';
  const l0f     = document.getElementById('dl-l0')?.value || '';
  const l1f     = document.getElementById('dl-l1')?.value || '';
  const cof     = (document.getElementById('dl-co')?.value || '').toLowerCase();
  const ctryf   = document.getElementById('dl-ctry')?.value || '';
  const exchf   = document.getElementById('dl-exch')?.value || '';
  const coStat  = document.getElementById('dl-coStatus')?.value || '';
  const llmf    = document.getElementById('dl-llm')?.value || '';
  const yrFrom  = parseInt(document.getElementById('dl-yr-from')?.value || '2017');
  const yrTo    = parseInt(document.getElementById('dl-yr-to')?.value   || '2025');
  const minPct  = parseFloat(document.getElementById('dl-minpct')?.value || '0') || 0;
  const inclP   = document.getElementById('dl-pure')?.checked  !== false;
  const inclQ   = document.getElementById('dl-quasi')?.checked !== false;
  const inclM   = document.getElementById('dl-marg')?.checked  !== false;

  const pool = src === 'gc'
    ? GOLDEN.map(g => ({ coId:g.coId, coName:g.coName, isin:g.isin, l0:g.l0, l0Name:g.l0Name }))
    : COMPANIES.map(c => ({ coId:c.id, coName:c.name, isin:c.isin,
        l0: WORKBENCH.find(w=>w.coId===c.id)?.l0 || '',
        l0Name: WORKBENCH.find(w=>w.coId===c.id)?.l0Name || '' }));

  const rows = [];
  pool.forEach(entry => {
    const co = COMPANIES.find(c=>c.id===entry.coId) || {};
    if (cof    && !entry.coName.toLowerCase().includes(cof) && !entry.isin.toLowerCase().includes(cof)) return;
    if (ctryf  && co.country  !== ctryf)  return;
    if (exchf  && co.exchange  !== exchf)  return;
    if (coStat && co.status   !== coStat) return;
    if (l0f    && entry.l0    !== l0f)    return;
    for (let yr = yrFrom; yr <= yrTo; yr++) {
      const d = (CLSDATA[entry.coId] || {})[yr];
      if (!d) continue;
      d.segments.forEach(s => {
        if (l1f  && s.l1  !== l1f)     return;
        if (s.pct < minPct)             return;
        if (s.cls === 'Pure Play'  && !inclP) return;
        if (s.cls === 'Quasi'      && !inclQ) return;
        if (s.cls === 'Marginal'   && !inclM) return;
        if (llmf === 'llm'    && !s.llm)  return;
        if (llmf === 'manual' &&  s.llm)  return;
        rows.push({
          'Company':        entry.coName,
          'ISIN':           entry.isin,
          'Country':        co.country   || '',
          'Exchange':       co.exchange  || '',
          'Currency':       co.currency  || '',
          'FY End':         co.fyEnd     || '',
          'Year':           yr,
          'L0 Code':        d.l0         || '',
          'Sector':         entry.l0Name || '',
          'L1 Code':        s.l1         || '',
          'Theme':          s.l1n        || '',
          'L2 Code':        s.l2         || '',
          'Sub-Theme':      s.l2n        || '',
          'AR Segment':     s.label,
          'Revenue (Mn)':   s.rev        || '',
          'Rev %':          s.pct.toFixed(2),
          'Classification': s.cls,
          'Source':         s.llm ? 'Automation' : 'Manual',
          'AR Page':        s.pg         || '',
          'Data Source':    src === 'gc' ? 'Golden Copy' : 'Workbench',
        });
      });
    }
  });
  return rows;
}

window.generateReport = function() {
  const rows = buildReportRows();
  if (!rows.length) { toast('No records match the selected filters.', 'warn'); return; }
  const fmt = document.querySelector('input[name="dl-fmt"]:checked')?.value || 'csv';
  const yrFrom = document.getElementById('dl-yr-from')?.value || '2017';
  const yrTo   = document.getElementById('dl-yr-to')?.value   || '2025';
  const fn = 'itics_export_' + yrFrom + '_' + yrTo;
  if (fmt === 'csv') dlCSV(rows, fn + '.csv');
  else dlXLSX([{name:'ITICS Export', data:rows}], fn + '.xlsx');
  toast('Exported ' + rows.length.toLocaleString() + ' records as ' + fmt.toUpperCase() + ' ✓', 'ok');
};

window.asgApplyBar=function(){

window.asgLeaveCover=function(){
  var lp=document.getElementById('leave-person').value; var rs=(document.getElementById('leave-reason').value||'').trim();
  if(!lp){toast('Select person.','err');return;} if(!rs){toast('Reason required.','err');return;}
  var parts=lp.split(':'),name=parts[0],role2=parts[1];
  var pool=role2==='analyst'?ROLE_USERS.analyst.map(function(u){return u.name;}).filter(function(n){return n!==name;}):ROLE_USERS.qc.map(function(u){return u.name;}).filter(function(n){return n!==name;});
  if(!pool.length){toast('No remaining team members.','err');return;}
  var targets=WORKBENCH.filter(function(w){if(w.wfStatus==='COMPLETED')return false;return role2==='analyst'?w.assignedTo===name:w.qcAssignedTo===name;});
  if(!targets.length){toast(name+' has no open tasks.','warn');return;}
  var idx=0; targets.forEach(function(w){var np=pool[idx%pool.length];idx++;
    if(role2==='analyst')w.assignedTo=np; else w.qcAssignedTo=np;
    AUDIT.unshift({id:'AL'+uid(),user:currentUser.name,role:currentRole,action:'Leave Cover',co:w.coName,year:'--',ts:new Date().toLocaleString('en-GB'),detail:(role2==='analyst'?'Analyst':'QC')+': '+name+' to '+np+'. '+rs});
  });
  toast('Redistributed '+targets.length+' task'+(targets.length!==1?'s':'')+' from '+name+'.','ok');renderAssignments();
};

window.downloadLevelTemplate = function() {
  var wb = XLSX.utils.book_new();
  var l0sheet = XLSX.utils.json_to_sheet([{Code:'001',Name:'Example Sector'}]);
  var l1sheet = XLSX.utils.json_to_sheet([{Code:'101',Name:'Example Theme',Parent_L0_Code:'001'}]);
  var l2sheet = XLSX.utils.json_to_sheet([{Code:'10101',Name:'Example Sub-Theme',Parent_L1_Code:'101',Parent_L0_Code:'001',Description:'Optional description'}]);
  XLSX.utils.book_append_sheet(wb, l0sheet, 'L0');
  XLSX.utils.book_append_sheet(wb, l1sheet, 'L1');
  XLSX.utils.book_append_sheet(wb, l2sheet, 'L2');
  XLSX.writeFile(wb, 'ITICS_Levels_Template.xlsx');
  toast('Template downloaded.', 'ok');
};

window.doLevelBulkUpload = function() {
  var inp = document.getElementById('lv-bulk-file');
  if (!inp || !inp.files[0]) { toast('Please select a file.', 'err'); return; }
  var file = inp.files[0];
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var wb = XLSX.read(e.target.result, {type:'array'});
      var addedL0=0, addedL1=0, addedL2=0, skipped=0;
      var now = currentUser.name;
      // L0 sheet
      if (wb.SheetNames.includes('L0')) {
        var rows = XLSX.utils.sheet_to_json(wb.Sheets['L0']);
        rows.forEach(function(r) {
          var c=String(r.Code||'').trim(), n=String(r.Name||'').trim();
          if (!c||!n) return;
          if (TAX.L0.find(function(x){return x.c===c;})) { skipped++; return; }
          TAX.L0.push({c:c, n:n, addedBy:now, modifiedBy:now}); addedL0++;
        });
      }
      // L1 sheet
      if (wb.SheetNames.includes('L1')) {
        var rows1 = XLSX.utils.sheet_to_json(wb.Sheets['L1']);
        rows1.forEach(function(r) {
          var c=String(r.Code||'').trim(), n=String(r.Name||'').trim(), l0=String(r.Parent_L0_Code||'').trim();
          if (!c||!n) return;
          if (TAX.L1.find(function(x){return x.c===c;})) { skipped++; return; }
          TAX.L1.push({c:c, n:n, l0:l0, addedBy:now, modifiedBy:now}); addedL1++;
        });
      }
      // L2 sheet
      if (wb.SheetNames.includes('L2')) {
        var rows2 = XLSX.utils.sheet_to_json(wb.Sheets['L2']);
        rows2.forEach(function(r) {
          var c=String(r.Code||'').trim(), n=String(r.Name||'').trim();
          var l1=String(r.Parent_L1_Code||'').trim(), l0=String(r.Parent_L0_Code||'').trim();
          var d=String(r.Description||'').trim();
          if (!c||!n) return;
          if (TAX.L2.find(function(x){return x.c===c;})) { skipped++; return; }
          TAX.L2.push({c:c, n:n, l1:l1, l0:l0, d:d, addedBy:now, modifiedBy:now}); addedL2++;
        });
      }
      AUDIT.unshift({id:'AL'+uid(),user:currentUser.name,role:currentRole,
        action:'Levels Bulk Upload',co:'--',year:'--',
        ts:new Date().toLocaleString('en-GB'),
        detail:'Added Sectors:'+addedL0+' Themes:'+addedL1+' Sub-Themes:'+addedL2+'. Skipped (duplicates): '+skipped});
      closeModal();
      toast('Imported — Sectors: '+addedL0+', Themes: '+addedL1+', Sub-Themes: '+addedL2+'. Skipped: '+skipped+'.', 'ok');
      renderLevels();
    } catch(err) {
      toast('Error reading file: '+err.message, 'err');
    }
  };
  reader.readAsArrayBuffer(file);
};

  if (!na && !nq) { toast('Select Analyst or QC to assign.', 'err'); return; }
  if (!rs) { toast('Reason is required.', 'err'); return; }
  var ids = Object.keys(window._wbSel||{}).filter(function(k) { return window._wbSel[k]; });
  if (!ids.length) { toast('No tasks selected.', 'warn'); return; }
  var count = 0;
  ids.forEach(function(id) {
    var w = WORKBENCH.find(function(x) { return x.id === id; }); if (!w) return;
    var ch = [];
    if (na && na !== w.assignedTo)   { ch.push('Analyst: '+w.assignedTo+' → '+na);   w.assignedTo   = na; }
    if (nq && nq !== w.qcAssignedTo) { ch.push('QC: '+w.qcAssignedTo+' → '+nq);     w.qcAssignedTo = nq; }
    if (ch.length) {
      count++;
      AUDIT.unshift({ id:'AL'+uid(), user:currentUser.name, role:currentRole,
        action:'Task Reassigned', co:w.coName, year:'--',
        ts:new Date().toLocaleString('en-GB'),
        detail:ch.join(' | ')+'. Reason: '+rs });
    }
  });
  window._wbSel = {};
  closeModal();
  toast('Updated '+count+' task'+(count!==1?'s':'')+'.', 'ok');
  renderWorkbench();
};
// Bulk reassign ALL tasks from one person to another (no multi-select needed)
window.openWbBulkReassign = function() {
  var anaOpts = ROLE_USERS.analyst.map(function(u){return '<option value="'+u.name+':analyst">'+u.name+' (Analyst)</option>';}).join('');
  var qcOpts  = ROLE_USERS.qc.map(function(u){return '<option value="'+u.name+':qc">'+u.name+' (QC)</option>';}).join('');
  var fromOpts = '<option value="">-- select person --</option>'+anaOpts+qcOpts;
  var toAnaOpts = '<option value="">-- select analyst --</option>'+ROLE_USERS.analyst.map(function(u){return '<option value="'+u.name+':analyst">'+u.name+'</option>';}).join('');
  var toQcOpts  = '<option value="">-- select QC --</option>'+ROLE_USERS.qc.map(function(u){return '<option value="'+u.name+':qc">'+u.name+'</option>';}).join('');
  showModal('<div class="m-hd">'
    +'<div><div class="m-title">Reassign All From Person</div>'
    +'<div class="m-sub">Transfer all open tasks from one person to another</div></div>'
    +'<button class="m-close" onclick="closeModal()">&#x2715;</button></div>'
    +'<div class="m-body">'
    +'<div class="fg"><label class="fl">Reassign FROM <span class="req">*</span></label>'
    +'<select class="fs" id="wbbr-from">'+fromOpts+'</select></div>'
    +'<div class="fg"><label class="fl">Reassign TO <span class="req">*</span></label>'
    +'<select class="fs" id="wbbr-to"><option value="">-- select target --</option>'+ROLE_USERS.analyst.map(function(u){return '<option value="'+u.name+':analyst">'+u.name+' (Analyst)</option>';}).join('')+ROLE_USERS.qc.map(function(u){return '<option value="'+u.name+':qc">'+u.name+' (QC)</option>';}).join('')+'</select></div>'
    +'<div class="fg"><label class="fl">Reason <span class="req">*</span></label>'
    +'<input class="fi" id="wbbr-reason" placeholder="e.g. Analyst on leave, workload rebalancing..."></div>'
    +'<div style="background:var(--amber-bg);border:1px solid var(--amber-bd);border-radius:var(--radius);padding:8px 12px;font-size:12px;color:var(--amber);margin-top:4px">All open tasks assigned to the FROM person will be reassigned. This cannot be undone automatically.</div>'
    +'</div>'
    +'<div class="m-foot">'
    +'<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>'
    +'<button class="btn btn-primary" onclick="wbBulkReassign()">Reassign All Tasks</button>'
    +'</div>', 'm-md');
};
window.wbBulkReassign = function() {
  var fromVal = document.getElementById('wbbr-from')?.value;
  var toVal   = document.getElementById('wbbr-to')?.value;
  var rs      = (document.getElementById('wbbr-reason')?.value||'').trim();
  if (!fromVal) { toast('Select the FROM person.','err'); return; }
  if (!toVal)   { toast('Select the TO person.','err'); return; }
  if (!rs)      { toast('Reason is required.','err'); return; }
  var fromParts = fromVal.split(':'), fromName=fromParts[0], fromRole=fromParts[1];
  var toParts   = toVal.split(':'),   toName=toParts[0],   toRole=toParts[1];
  if (fromVal === toVal) { toast('FROM and TO cannot be the same person.','err'); return; }
  var targets = WORKBENCH.filter(function(w){
    if (w.wfStatus==='COMPLETED') return false;
    if (fromRole==='analyst') return w.assignedTo===fromName;
    return w.qcAssignedTo===fromName;
  });
  if (!targets.length) { toast(fromName+' has no open tasks to reassign.','warn'); return; }
  targets.forEach(function(w){
    var ch = [];
    if (fromRole==='analyst') { ch.push('Analyst: '+w.assignedTo+' → '+toName); w.assignedTo=toName; }
    else { ch.push('QC: '+w.qcAssignedTo+' → '+toName); w.qcAssignedTo=toName; }
    AUDIT.unshift({id:'AL'+uid(),user:currentUser.name,role:currentRole,
      action:'Bulk Reassigned',co:w.coName,year:'--',
      ts:new Date().toLocaleString('en-GB'),
      detail:ch.join('')+'. Reason: '+rs});
  });
  closeModal();
  toast('Reassigned '+targets.length+' task'+(targets.length!==1?'s':'')+' from '+fromName+' to '+toName+'.','ok');
  renderWorkbench();
};
